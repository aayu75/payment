<!DOCTYPE html>
<html>
<head>
  <title>UPI Payment</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, select {
      padding: 10px;
      width: 100%;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>UPI Payment</h2>

  <input type="number" id="amount" placeholder="Enter ₹500–₹1000">

  <select id="person" onchange="checkOther()">
    <option value="">Who is paying?</option>
    <option value="Mama">Mama</option>
    <option value="Bhaiya">Bhaiya</option>
    <option value="Other">Other</option>
  </select>

  <input type="text" id="otherName" placeholder="Enter name" style="display:none;">

  <button onclick="pay()">Pay Now</button>
</div>

<script>
function checkOther() {
  let person = document.getElementById("person").value;
  document.getElementById("otherName").style.display =
    person === "Other" ? "block" : "none";
}

function pay() {
  let amt = document.getElementById("amount").value;
  let person = document.getElementById("person").value;
  let other = document.getElementById("otherName").value;

  if (amt < 500 || amt > 1000) {
    alert("Enter amount between ₹500 and ₹1000");
    return;
  }

  if (!person) {
    alert("Please select who is paying");
    return;
  }

  let name = person === "Other" ? other : person;

  if (person === "Other" && !other) {
    alert("Enter name");
    return;
  }

  let note = `Payment from ${name}`;

  let upi = `upi://pay?pa=yourupi@bank&pn=Ayush&am=${amt}&cu=INR&tn=${encodeURIComponent(note)}`;

  window.location.href = upi;
}
</script>

</body>
</html>
