<!DOCTYPE html>
<html>
<head>
  <title>UPI Payment</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      padding: 10px;
      width: 100%;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Pay via UPI</h2>
  <input type="number" id="amount" placeholder="Enter ₹500–₹1000">
  <button onclick="pay()">Pay Now</button>
</div>

<script>
function pay() {
  let amt = document.getElementById("amount").value;

  if (amt < 500 || amt > 1000) {
    alert("Enter amount between ₹500 and ₹1000");
    return;
  }

  let upi = `upi://pay?pa=yourupi@bank&pn=Ayush&am=${amt}&cu=INR`;
  window.location.href = upi;
}
</script>

</body>
</html>
